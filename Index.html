<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:350px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:15px;
    padding:10px;
    background:#eef;
    border-radius:5px;
}
</style>
</head>
<body>

<div class="container">
    <h2>Attendance Calculator</h2>

    <label>Classes Attended</label>
    <input type="number" id="attended">

    <label>Total Classes</label>
    <input type="number" id="total">

    <label>Target Attendance (%)</label>
    <input type="number" id="target" value="75">

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result"></div>
</div>

<script>
function calculate(){

    let attended = parseFloat(document.getElementById("attended").value);
    let total = parseFloat(document.getElementById("total").value);
    let target = parseFloat(document.getElementById("target").value);

    if(attended > total){
        document.getElementById("result").innerHTML =
        "Attended classes cannot exceed total classes.";
        return;
    }

    let percentage = (attended/total)*100;

    let needed = 0;

    if(percentage < target){
        needed = Math.ceil(
        ((target*total) - (100*attended)) / (100-target)
        );
    }

    let bunk = Math.floor(
        ((100*attended) - (target*total)) / target
    );

    if(bunk < 0) bunk = 0;

    document.getElementById("result").innerHTML = `
    <b>Current Attendance:</b> ${percentage.toFixed(2)}% <br><br>
    <b>Classes Needed to Reach ${target}%:</b> ${needed} <br><br>
    <b>Classes You Can Bunk:</b> ${bunk}
    `;
}
</script>

</body>
</html>
